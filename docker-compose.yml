version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pg_management_app
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/pg_management
      - JWT_SECRET=supersecretjwtkey123
      - EMAIL_USER=krishanshgupta542004@gmail.com
      - EMAIL_PASS=Awesome@1234
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/app/backend/uploads

  mongodb:
    image: mongo:6.0
    container_name: pg_management_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  uploads_data:
